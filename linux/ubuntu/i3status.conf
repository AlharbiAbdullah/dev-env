# i3status config - Gruvbox themed

general {
    colors = true
    color_good = "#b8bb26"
    color_degraded = "#fabd2f"
    color_bad = "#fb4934"
    interval = 5
}

order += "wireless _first_"
order += "ethernet _first_"
order += "disk /"
order += "memory"
order += "cpu_usage"
order += "load"
order += "volume master"
order += "tztime local"

wireless _first_ {
    format_up = "W: %essid %quality"
    format_down = "W: down"
}

ethernet _first_ {
    format_up = "E: %ip"
    format_down = ""
}

disk "/" {
    format = "D: %avail"
}

memory {
    format = "M: %used/%total"
    threshold_degraded = "1G"
    threshold_critical = "200M"
}

cpu_usage {
    format = "CPU: %usage"
}

load {
    format = "L: %1min"
}

volume master {
    format = "V: %volume"
    format_muted = "V: muted"
}

tztime local {
    format = "%Y-%m-%d %H:%M"
}
