# Application bindings
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- wezterm start --always-new-process --cwd /home/abdullah
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- wezterm start --always-new-process --cwd /home/abdullah -- bash -c 'tmux attach || tmux new -s Work'
bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, B, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, omarchy-launch-browser --private
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER, N, Simplenote, exec, omarchy-launch-or-focus ^simplenote$ "uwsm-app -- simplenote"
bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER SHIFT, G, Signal, exec, omarchy-launch-or-focus ^signal$ "uwsm-app -- signal-desktop"
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"
bindd = SUPER SHIFT, W, Typora, exec, uwsm-app -- typora --enable-wayland-ime
bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- 1password

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
bindd = SUPER SHIFT, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com"
bindd = SUPER SHIFT ALT, A, Grok, exec, omarchy-launch-webapp "https://grok.com"
bindd = SUPER SHIFT, C, Calendar, exec, omarchy-launch-webapp "https://app.hey.com/calendar/weeks/"
bindd = SUPER SHIFT, E, Email, exec, omarchy-launch-webapp "https://app.hey.com"
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"
bindd = SUPER SHIFT ALT, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bindd = SUPER SHIFT CTRL, G, Google Messages, exec, omarchy-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"
bindd = SUPER SHIFT, P, Google Photos, exec, omarchy-launch-or-focus-webapp "Google Photos" "https://photos.google.com/"
bindd = SUPER SHIFT ALT, X, X Post, exec, omarchy-launch-webapp "https://x.com/compose/post"

# Add extra bindings
# bind = SUPER SHIFT, R, exec, alacritty -e ssh your-server
bindd = SUPER, H, Toggle Waybar, exec, omarchy-toggle-waybar

# Alt app launchers (Mac Option muscle memory)
bindd = ALT, B, Browser, exec, omarchy-launch-browser
bindd = ALT, C, Claude, exec, omarchy-launch-webapp "https://claude.ai/"
bindd = ALT, G, GitHub profile, exec, omarchy-launch-webapp "https://github.com/AlharbiAbdullah"
bindd = ALT, A, abdullahsaad.dev, exec, omarchy-launch-webapp "https://abdullahsaad.dev/"
bindd = ALT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"
bindd = ALT, W, WhatsApp, exec, omarchy-launch-webapp "https://web.whatsapp.com/"
bindd = ALT, M, Gmail, exec, omarchy-launch-webapp "https://mail.google.com/"
bindd = ALT, X, X, exec, omarchy-launch-webapp "https://x.com/"
bindd = ALT, I, Obsidian, exec, omarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER, SPACE
# bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu

# Close window on Super + Q instead of Super + W (macOS muscle memory)
unbind = SUPER, W
bindd = SUPER, Q, Close window, killactive,

# Lid switch: disable laptop screen when closed IF an external monitor is connected.
# If no external monitor, do nothing (system keeps running; logind decides suspend).
bindl = , switch:on:Lid Switch, exec, [ "$(hyprctl monitors | grep -c '^Monitor')" -gt 1 ] && hyprctl keyword monitor "eDP-2, disable"
bindl = , switch:off:Lid Switch, exec, hyprctl keyword monitor "eDP-2, preferred, auto, 1.6"

# Screenshot: Ctrl + Shift + 3 (matches macOS muscle memory).
# Captures the focused monitor (no region selection) and copies to clipboard.
# Also saves a file to ~/Pictures as a safety net.
bindd = CTRL SHIFT, 3, Screenshot (fullscreen), exec, omarchy-cmd-screenshot fullscreen

# Zoom: remove Super+Ctrl+Z (conflicts with undo muscle memory).
# Use Super+Ctrl+= for zoom in and Super+Ctrl+- for zoom out.
unbind = SUPER CTRL, Z
bindd = SUPER CTRL, equal, Zoom in, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float + 1')
bindd = SUPER CTRL, minus, Zoom out, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq 'if .float > 1 then .float - 1 else 1 end')

# macOS muscle memory: Super+A = Select All, Super+Z = Undo.
# Intercepts at the compositor and forwards Ctrl+A / Ctrl+Z to the focused window.
bindd = SUPER, A, Select all (Ctrl+A), sendshortcut, CTRL, A, activewindow
bindd = SUPER, Z, Undo (Ctrl+Z), sendshortcut, CTRL, Z, activewindow
