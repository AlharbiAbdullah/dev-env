# Change prefix to Ctrl+a (easier to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Windows start at 1
set -g base-index 1

# Panes start at 1 too
setw -g pane-base-index 1

# Easy split keys
bind | split-window -h    # Ctrl+a then | = vertical split
bind - split-window -v    # Ctrl+a then - = horizontal split

# Enable mouse support (scroll, click, resize panes)
set -g mouse on

# Copy to system clipboard when selecting with mouse
set -g set-clipboard on
bind -T copy-mode MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# Shift+Enter passthrough
bind -n S-Enter send-keys Escape "[13;2u"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# Initialize plugin manager (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
